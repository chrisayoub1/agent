<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-AGENT | Voice Browser Automation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
  --bg: #030712;
  --panel: #0c111d;
  --panel2: #111827;
  --border: #1f2937;
  --border2: #374151;
  --primary: #7c3aed;
  --primary-light: #a78bfa;
  --primary-glow: rgba(124,58,237,0.3);
  --accent: #06b6d4;
  --accent-glow: rgba(6,182,212,0.2);
  --green: #10b981;
  --red: #ef4444;
  --text: #f9fafb;
  --text2: #9ca3af;
  --text3: #6b7280;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ─── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 20px;
  gap: 20px;
  overflow-y: auto;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.logo-text h2 {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
}

.logo-text span {
  font-size: 10px;
  color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 1px;
}

.sidebar-section h4 {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 500;
}

.field input,
.field select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--panel2);
  color: var(--text);
  font-size: 13px;
  font-family: 'IBM Plex Mono', monospace;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus,
.field select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.field select option { background: var(--panel2); }

.btn-save {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--primary), #6d28d9);
  color: white;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: opacity 0.2s, transform 0.1s;
}

.btn-save:hover { opacity: 0.9; }
.btn-save:active { transform: scale(0.98); }

.server-status {
  margin-top: auto;
  padding: 12px;
  border-radius: 10px;
  background: var(--panel2);
  border: 1px solid var(--border);
}

.server-status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
}

.server-status-row span:first-child { color: var(--text3); }
.server-status-row .badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  background: rgba(16,185,129,0.15);
  color: var(--green);
  border: 1px solid rgba(16,185,129,0.3);
}

/* ─── MAIN ─────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--panel2);
  border: 1px solid var(--border2);
  font-size: 13px;
  font-weight: 500;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}

.dot.listening {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 1s infinite;
}

.dot.speaking {
  background: var(--primary-light);
  box-shadow: 0 0 8px var(--primary-light);
  animation: pulse 0.6s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.topbar-actions {
  display: flex;
  gap: 10px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--panel2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.2s;
}

.icon-btn:hover { border-color: var(--primary); color: var(--primary-light); }

/* ─── AVATAR ZONE ───────────────────────────────── */
.avatar-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  position: relative;
  overflow: hidden;
}

.avatar-zone::before {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
  pointer-events: none;
}

.avatar-ring {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.avatar-ring::before {
  content: '';
  position: absolute;
  width: 310px;
  height: 310px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  animation: rotatering 20s linear infinite;
}

.avatar-ring::after {
  content: '';
  position: absolute;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  border: 1px dashed var(--border);
  animation: rotatering 30s linear infinite reverse;
}

@keyframes rotatering {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

#avatar-svg {
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 20px var(--primary-glow));
  transition: filter 0.3s;
}

#avatar-svg.talking {
  filter: drop-shadow(0 0 30px rgba(124,58,237,0.6));
  animation: avatalpulse 0.4s ease-in-out infinite alternate;
}

@keyframes avatalpulse {
  from { transform: scale(1); }
  to { transform: scale(1.02); }
}

/* Mic button */
.mic-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 2;
}

#btn-listen {
  width: 72px;
  height: 72px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #6d28d9);
  color: white;
  font-size: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 0 var(--primary-glow);
  transition: transform 0.15s, box-shadow 0.3s;
}

#btn-listen:hover { transform: scale(1.06); }

#btn-listen.listening {
  background: linear-gradient(135deg, var(--accent), #0891b2);
  box-shadow: 0 0 0 12px rgba(6,182,212,0.15), 0 0 30px var(--accent-glow);
  animation: micpulse 1.2s ease-in-out infinite;
}

@keyframes micpulse {
  0%,100% { box-shadow: 0 0 0 8px rgba(6,182,212,0.15), 0 0 20px var(--accent-glow); }
  50% { box-shadow: 0 0 0 18px rgba(6,182,212,0.05), 0 0 40px var(--accent-glow); }
}

#mic-label-text {
  font-size: 12px;
  color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.5px;
}

/* Visualizer */
#audio-visualizer {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 32px;
}

#audio-visualizer .bar {
  width: 4px;
  background: var(--primary-light);
  border-radius: 2px;
  height: 6px;
  transition: height 0.1s;
}

#audio-visualizer.active .bar:nth-child(1) { animation: vis 0.6s ease infinite; }
#audio-visualizer.active .bar:nth-child(2) { animation: vis 0.8s ease 0.1s infinite; }
#audio-visualizer.active .bar:nth-child(3) { animation: vis 0.5s ease 0.2s infinite; }
#audio-visualizer.active .bar:nth-child(4) { animation: vis 0.9s ease 0.05s infinite; }
#audio-visualizer.active .bar:nth-child(5) { animation: vis 0.7s ease 0.15s infinite; }

@keyframes vis {
  0%,100% { height: 6px; }
  50% { height: 28px; }
}

/* ─── CONSOLE ───────────────────────────────────── */
.console-panel {
  height: 220px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.console-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.console-header span {
  font-size: 11px;
  color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.console-clear {
  font-size: 11px;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  transition: color 0.2s;
}

.console-clear:hover { color: var(--primary-light); }

.console-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.log-entry {
  display: flex;
  gap: 10px;
  padding: 3px 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.5;
  border-bottom: 1px solid transparent;
}

.log-entry .timestamp { color: var(--text3); flex-shrink: 0; }
.log-entry.system .message { color: var(--text2); }
.log-entry.user .message { color: var(--accent); }
.log-entry.agent .message { color: var(--primary-light); }
.log-entry.error .message { color: var(--red); }
.log-entry.glow-purple .message { color: #c4b5fd; }

/* ─── TOAST ─────────────────────────────────────── */
.toast {
  display: none;
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  z-index: 999;
  box-shadow: 0 4px 20px rgba(16,185,129,0.4);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">

  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-microchip"></i></div>
    <div class="logo-text">
      <h2>V-AGENT</h2>
      <span>VOICE AUTOMATION</span>
    </div>
  </div>

  <div class="sidebar-section">
    <h4>Voice Settings</h4>
    <div class="field">
      <label>Voice Model</label>
      <select id="voice-select">
        <option value="female-yujie">Female — Yujie</option>
        <option value="female-tianmei">Female — Tianmei</option>
        <option value="male-qn-qingse">Male — Qingse</option>
      </select>
    </div>
  </div>

  <div class="sidebar-section">
    <h4>Browser Config</h4>
    <div class="field">
      <label>Automation API URL</label>
      <input id="local-api-url" value="http://localhost:3500" placeholder="http://localhost:3500">
    </div>
    <div class="field">
      <label>Browser Profile ID</label>
      <input id="browser-profile-id" placeholder="Enter profile ID">
    </div>
  </div>

  <button class="btn-save" onclick="saveSettings()">
    <i class="fa-solid fa-floppy-disk" style="margin-right:8px"></i>Save Settings
  </button>

  <div class="server-status">
    <div class="server-status-row">
      <span>API Server</span>
      <span class="badge">CONNECTED</span>
    </div>
  </div>

</aside>

<!-- MAIN -->
<main class="main">

  <header class="topbar">
    <div class="status-pill">
      <span class="dot" id="status-pulse"></span>
      <span id="agent-status-text">System Ready</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" title="Clear console" onclick="clearConsole()">
        <i class="fa-solid fa-trash-can"></i>
      </button>
    </div>
  </header>

  <!-- AVATAR -->
  <div class="avatar-zone">

    <div class="avatar-ring">
      <svg id="avatar-svg" width="260" height="260" viewBox="0 0 400 400">
        <defs>
          <radialGradient id="faceGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#0f0a1e"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Face -->
        <circle cx="200" cy="200" r="150" fill="url(#faceGrad)" stroke="#7c3aed" stroke-width="2"/>
        <circle cx="200" cy="200" r="150" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>

        <!-- Eyes -->
        <g class="eye-left-group" filter="url(#glow)">
          <circle cx="150" cy="180" r="22" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
          <circle cx="150" cy="180" r="12" fill="#7c3aed"/>
          <circle cx="150" cy="180" r="5" fill="#a78bfa"/>
          <circle cx="155" cy="175" r="3" fill="white" opacity="0.7"/>
        </g>

        <g class="eye-right-group" filter="url(#glow)">
          <circle cx="250" cy="180" r="22" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
          <circle cx="250" cy="180" r="12" fill="#7c3aed"/>
          <circle cx="250" cy="180" r="5" fill="#a78bfa"/>
          <circle cx="255" cy="175" r="3" fill="white" opacity="0.7"/>
        </g>

        <!-- Mouth (idle) -->
        <path id="mouth-idle" d="M165 255 Q200 275 235 255" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- Mouth (talking) -->
        <ellipse id="mouth-talk" cx="200" cy="262" rx="30" ry="12" fill="#7c3aed" opacity="0" />

        <!-- Decorative details -->
        <circle cx="200" cy="130" r="4" fill="#06b6d4" opacity="0.6"/>
        <line x1="180" y1="130" x2="160" y2="120" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
        <line x1="220" y1="130" x2="240" y2="120" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
      </svg>
    </div>

    <div class="mic-wrapper">
      <button id="btn-listen" onclick="toggleListening()">
        <i id="mic-icon" class="fa-solid fa-microphone"></i>
      </button>
      <span id="mic-label-text">Click to speak to Agent</span>
    </div>

    <div id="audio-visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

  </div>

  <!-- CONSOLE -->
  <div class="console-panel">
    <div class="console-header">
      <span>// System Console</span>
      <button class="console-clear" onclick="clearConsole()">Clear</button>
    </div>
    <div id="console-logs" class="console-body"></div>
  </div>

</main>

<div id="toast" class="toast">
  <i class="fa-solid fa-check" style="margin-right:8px"></i>Settings Saved
</div>

<script src="app.js"></script>

</body>
</html>
