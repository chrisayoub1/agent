<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-AGENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
  --bg: #030712;
  --panel: #0c111d;
  --border: #1f2937;
  --primary: #7c3aed;
  --primary-light: #a78bfa;
  --primary-glow: rgba(124,58,237,0.35);
  --accent: #06b6d4;
  --accent-glow: rgba(6,182,212,0.25);
  --green: #10b981;
  --red: #ef4444;
  --text: #f9fafb;
  --text2: #9ca3af;
  --text3: #4b5563;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

/* ── TOP BAR ── */
.topbar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--primary-light);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  flex-shrink: 0;
}
.dot.listening {
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: blink 1s infinite;
}
.dot.speaking {
  background: var(--primary-light);
  box-shadow: 0 0 10px var(--primary-light);
  animation: blink 0.5s infinite;
}
@keyframes blink {
  0%,100%{opacity:1;} 50%{opacity:0.3;}
}

/* ── AVATAR CENTER ── */
.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  position: relative;
}

/* ambient glow behind face */
.center::before {
  content: '';
  position: absolute;
  width: 420px; height: 420px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--primary-glow) 0%, transparent 65%);
  pointer-events: none;
}

/* rotating rings */
.ring-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ring-wrap::before {
  content: '';
  position: absolute;
  width: 320px; height: 320px;
  border-radius: 50%;
  border: 1px solid rgba(124,58,237,0.25);
  animation: spin 18s linear infinite;
}
.ring-wrap::after {
  content: '';
  position: absolute;
  width: 370px; height: 370px;
  border-radius: 50%;
  border: 1px dashed rgba(124,58,237,0.12);
  animation: spin 28s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }

#avatar-svg {
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 22px var(--primary-glow));
  transition: filter 0.3s;
}
#avatar-svg.talking {
  filter: drop-shadow(0 0 38px rgba(124,58,237,0.65));
  animation: breathe 0.4s ease-in-out infinite alternate;
}
@keyframes breathe {
  from { transform: scale(1); }
  to   { transform: scale(1.025); }
}

/* ── AGENT TEXT BUBBLE ── */
#agent-bubble {
  font-size: 13px;
  color: var(--primary-light);
  letter-spacing: 0.5px;
  max-width: 480px;
  text-align: center;
  min-height: 20px;
  line-height: 1.6;
  opacity: 0;
  transition: opacity 0.4s;
}
#agent-bubble.visible { opacity: 1; }

/* ── MIC BUTTON ── */
.mic-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 2;
}

#btn-listen {
  width: 76px; height: 76px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #5b21b6);
  color: white;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, box-shadow 0.3s;
  box-shadow: 0 0 0 0 var(--primary-glow);
}
#btn-listen:hover { transform: scale(1.07); }
#btn-listen.listening {
  background: linear-gradient(135deg, var(--accent), #0e7490);
  animation: micring 1.3s ease-in-out infinite;
}
@keyframes micring {
  0%,100% { box-shadow: 0 0 0 6px rgba(6,182,212,0.15); }
  50%      { box-shadow: 0 0 0 18px rgba(6,182,212,0.04); }
}

#mic-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── VISUALIZER ── */
#visualizer {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 30px;
}
#visualizer .b {
  width: 4px;
  background: var(--primary-light);
  border-radius: 2px;
  height: 5px;
}
#visualizer.on .b:nth-child(1){animation:v .55s ease infinite;}
#visualizer.on .b:nth-child(2){animation:v .75s ease .08s infinite;}
#visualizer.on .b:nth-child(3){animation:v .5s ease .18s infinite;}
#visualizer.on .b:nth-child(4){animation:v .85s ease .04s infinite;}
#visualizer.on .b:nth-child(5){animation:v .65s ease .12s infinite;}
@keyframes v { 0%,100%{height:5px;} 50%{height:26px;} }

/* ── CONSOLE ── */
.console {
  width: 100%;
  height: 180px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.console-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.console-head span {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.console-head button {
  font-size: 10px;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 1px;
  transition: color 0.2s;
}
.console-head button:hover { color: var(--primary-light); }

.console-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 24px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
}

.log {
  display: flex;
  gap: 10px;
  font-size: 11px;
  padding: 2px 0;
  line-height: 1.6;
}
.log .ts { color: var(--text3); flex-shrink: 0; }
.log.sys .msg  { color: #6b7280; }
.log.user .msg { color: var(--accent); }
.log.agent .msg{ color: var(--primary-light); }
.log.auto .msg { color: #c4b5fd; }
.log.err .msg  { color: var(--red); }

/* ── TOAST ── */
#toast {
  display: none;
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--green);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  z-index: 999;
}
</style>
</head>
<body>

<!-- TOP -->
<header class="topbar">
  <div class="logo">V-AGENT</div>
  <div class="status-pill">
    <span class="dot" id="status-dot"></span>
    <span id="status-txt">READY</span>
  </div>
</header>

<!-- CENTER -->
<div class="center">

  <div class="ring-wrap">
    <svg id="avatar-svg" width="270" height="270" viewBox="0 0 400 400">
      <defs>
        <radialGradient id="fg" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#1e1b4b"/>
          <stop offset="100%" stop-color="#060412"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- face -->
      <circle cx="200" cy="200" r="152" fill="url(#fg)" stroke="#7c3aed" stroke-width="1.5"/>
      <circle cx="200" cy="200" r="152" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>

      <!-- left eye -->
      <g filter="url(#glow)">
        <circle cx="150" cy="178" r="23" fill="#12103a" stroke="#7c3aed" stroke-width="1.5"/>
        <circle cx="150" cy="178" r="13" fill="#7c3aed"/>
        <circle cx="150" cy="178" r="5"  fill="#c4b5fd"/>
        <circle cx="156" cy="173" r="3"  fill="white" opacity="0.75"/>
      </g>

      <!-- right eye -->
      <g filter="url(#glow)">
        <circle cx="250" cy="178" r="23" fill="#12103a" stroke="#7c3aed" stroke-width="1.5"/>
        <circle cx="250" cy="178" r="13" fill="#7c3aed"/>
        <circle cx="250" cy="178" r="5"  fill="#c4b5fd"/>
        <circle cx="256" cy="173" r="3"  fill="white" opacity="0.75"/>
      </g>

      <!-- mouth idle -->
      <path id="m-idle" d="M163 255 Q200 278 237 255" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- mouth talking -->
      <ellipse id="m-talk" cx="200" cy="263" rx="28" ry="13" fill="#7c3aed" opacity="0"/>

      <!-- tiny accent dots -->
      <circle cx="200" cy="125" r="4" fill="#06b6d4" opacity="0.5"/>
      <line x1="178" y1="125" x2="155" y2="114" stroke="#06b6d4" stroke-width="1" opacity="0.25"/>
      <line x1="222" y1="125" x2="245" y2="114" stroke="#06b6d4" stroke-width="1" opacity="0.25"/>
    </svg>
  </div>

  <!-- what the agent says -->
  <div id="agent-bubble"></div>

  <!-- mic -->
  <div class="mic-area">
    <button id="btn-listen" onclick="toggleListening()">
      <i id="mic-icon" class="fa-solid fa-microphone"></i>
    </button>
    <span id="mic-label">CLICK TO SPEAK</span>
  </div>

  <!-- visualizer -->
  <div id="visualizer">
    <div class="b"></div><div class="b"></div><div class="b"></div>
    <div class="b"></div><div class="b"></div>
  </div>

</div>

<!-- CONSOLE -->
<div class="console">
  <div class="console-head">
    <span>// console</span>
    <button onclick="clearLog()">clear</button>
  </div>
  <div id="logs" class="console-body"></div>
</div>

<div id="toast">✓ Done</div>

<script>
// ── CONFIG ──────────────────────────────────────
// Skyvern API key — set this to your key from app.skyvern.com/settings
const SKYVERN_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjQ5MjU5OTA5NjksInN1YiI6Im9fNTM4MzY0NTYxMjM4ODY0MTU2In0.5L7txy2sZjm2fFcgROP0vYJACIsdcV8m7DbCAqxwuAQ";
const SKYVERN_API_URL = 'https://api.skyvern.com/v1';

let recognition = null;
let isListening  = false;
let audioPlayer  = null;
let currentTaskId = null;

// ── INIT ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initSpeech();
  log('sys', 'V-AGENT online. Skyvern browser control ready.');
  setTimeout(() => speak("Hello! I am your voice agent with full browser control. Tell me what to do and I will do it."), 800);
});

// ── SPEECH RECOGNITION ──────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { log('err','Speech recognition not supported. Use Chrome or Edge.'); return; }

  // create ONE instance only — never recreate
  if (recognition) return;

  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 3;

  recognition.onstart  = () => {
    isListening = true;
    setStatus('LISTENING','listening');
    setMic(true);
    log('sys','Listening...');
  };

  recognition.onend = () => {
    isListening = false;
    setMic(false);
    // only reset status if not already speaking/working
    const s = document.getElementById('status-txt').textContent;
    if (s === 'LISTENING') setStatus('READY','');
  };

  recognition.onerror = (e) => {
    isListening = false;
    setMic(false);
    let msg = '';
    if (e.error === 'not-allowed')      msg = 'Microphone blocked. Click the lock icon and allow microphone access.';
    else if (e.error === 'no-speech')   msg = 'No speech detected. Please try again.';
    else if (e.error === 'network')     msg = 'Network error. Make sure you are on your HTTPS Vercel URL.';
    else if (e.error === 'audio-capture') msg = 'No microphone found. Check your mic is connected.';
    else if (e.error === 'aborted')     msg = 'Mic stopped. Click to try again.';
    else msg = `Mic error: ${e.error}`;
    log('err', msg);
    setStatus('READY','');
    // speak error only for important ones
    if (!['aborted','no-speech'].includes(e.error)) speak(msg);
  };

  recognition.onresult = (e) => {
    // grab final result or best interim
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        text = e.results[i][0].transcript.trim();
      }
    }
    if (!text) return; // wait for final
    log('user', `You: "${text}"`);
    recognition.stop();
    handleCommand(text);
  };
}

function toggleListening() {
  if (!recognition) { alert('Use Chrome or Edge for voice support.'); return; }
  if (isListening) {
    recognition.stop();
  } else {
    if (audioPlayer) { audioPlayer.pause(); stopAnim(); }
    window.speechSynthesis.cancel();
    try {
      recognition.start();
    } catch(e) {
      // already started — ignore
      log('sys', 'Mic already active.');
    }
  }
}

// ── COMMAND HANDLER ──────────────────────────────
function handleCommand(raw) {
  const t = raw.toLowerCase();
  setStatus('THINKING','');

  // local quick commands — no browser needed
  if (t.includes('hello') || t.includes('hi') || t.includes('hey')) {
    speak("Hey! I'm here. What do you need me to do?"); return;
  }
  if (t.includes('your name') || t.includes('who are you')) {
    speak("I'm V-Agent, your voice-controlled browser automation assistant."); return;
  }
  if (t.includes('what can you do') || t.includes('help')) {
    speak("I can control a real browser for you. Just tell me what to do. For example: search for AI tools on Google, go to LinkedIn and find remote jobs, or fill a form on any website."); return;
  }
  if (t.includes('what time') || t.includes('current time')) {
    speak(`The current time is ${new Date().toLocaleTimeString()}.`); return;
  }
  if (t.includes('stop') || t.includes('quiet') || t.includes('shut up')) {
    window.speechSynthesis.cancel();
    setStatus('READY',''); return;
  }
  if (t.includes('clear') && t.includes('console')) {
    clearLog(); speak("Console cleared."); return;
  }
  if (t.includes('task status') || t.includes('check task')) {
    if (currentTaskId) checkTaskStatus(currentTaskId);
    else speak("No active task running.");
    return;
  }

  // everything else → send to Skyvern to control browser
  runSkyvernTask(raw);
}

// ── SKYVERN BROWSER CONTROL ──────────────────────
async function runSkyvernTask(instruction) {
  if (SKYVERN_API_KEY === 'YOUR_SKYVERN_API_KEY') {
    speak("Please set your Skyvern API key in the HTML file first. Get it free from app dot skyvern dot com.");
    log('err', 'Skyvern API key not set. Edit SKYVERN_API_KEY in the HTML.');
    return;
  }

  speak(`Got it. Starting browser task: ${instruction}`);
  setStatus('WORKING','speaking');
  log('auto', `Sending to Skyvern: "${instruction}"`);

  // figure out a URL hint from the command
  let url = 'https://www.google.com';
  const t = instruction.toLowerCase();
  if (t.includes('linkedin')) url = 'https://www.linkedin.com';
  else if (t.includes('youtube')) url = 'https://www.youtube.com';
  else if (t.includes('twitter') || t.includes(' x ')) url = 'https://www.x.com';
  else if (t.includes('instagram')) url = 'https://www.instagram.com';
  else if (t.includes('gmail') || t.includes('email')) url = 'https://mail.google.com';
  else if (t.includes('amazon')) url = 'https://www.amazon.com';
  else if (t.includes('facebook')) url = 'https://www.facebook.com';

  try {
    // Correct Skyvern Cloud API endpoint
    const res = await fetch('https://api.skyvern.com/v1/tasks', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': SKYVERN_API_KEY
      },
      body: JSON.stringify({
        prompt: instruction,
        url: url,
        engine: 'skyvern-1.0',
        max_steps: 10
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Skyvern ${res.status}: ${errText}`);
    }

    const data = await res.json();
    currentTaskId = data.task_id || data.run_id || data.id;
    log('auto', `Task created. ID: ${currentTaskId}`);
    log('sys', `Skyvern is working... this may take 1-2 minutes`);
    speak("Browser task started. I will let you know when it is done. This may take a minute or two.");

    pollTaskStatus(currentTaskId);

  } catch(err) {
    log('err', `Skyvern error: ${err.message}`);
    speak("There was an error with the browser agent. Check the console for details.");
    setStatus('READY','');
  }
}

// ── POLL TASK STATUS ─────────────────────────────
async function pollTaskStatus(taskId) {
  const maxTries = 36; // 6 minutes max (every 10s)
  let tries = 0;

  const interval = setInterval(async () => {
    tries++;
    if (tries > maxTries) {
      clearInterval(interval);
      speak("Task is taking longer than expected. Check your Skyvern dashboard at app dot skyvern dot com.");
      setStatus('READY','');
      return;
    }

    try {
      const res = await fetch(`https://api.skyvern.com/v1/tasks/${taskId}`, {
        headers: { 'x-api-key': SKYVERN_API_KEY }
      });

      if (!res.ok) { log('sys', `Polling... (attempt ${tries})`); return; }

      const data = await res.json();
      const status = (data.status || '').toLowerCase();
      log('sys', `Task status: ${status} (check ${tries})`);

      if (['completed','success','finished'].includes(status)) {
        clearInterval(interval);
        setStatus('READY','');
        const out = data.output || data.extracted_information || data.failure_reason || 'Task completed.';
        const msg = typeof out === 'object' ? JSON.stringify(out) : String(out);
        speak(`Done! ${msg.substring(0, 250)}`);
        log('agent', `Result: ${msg}`);

      } else if (['failed','terminated','cancelled'].includes(status)) {
        clearInterval(interval);
        setStatus('READY','');
        const reason = data.failure_reason || 'Unknown reason';
        speak(`The browser task failed. Reason: ${reason}`);
        log('err', `Task failed: ${reason}`);
      }
    } catch(e) {
      log('sys', `Polling attempt ${tries}...`);
    }
  }, 10000);
}

async function checkTaskStatus(taskId) {
  speak("Checking task status...");
  try {
    const res = await fetch(`https://api.skyvern.com/v1/tasks/${taskId}`, {
      headers: { 'x-api-key': SKYVERN_API_KEY }
    });
    const data = await res.json();
    speak(`Task status is: ${data.status || 'unknown'}`);
    log('sys', JSON.stringify(data));
  } catch(e) {
    speak("Could not check task status.");
  }
}

// ── SPEAK — browser TTS only, no API needed ──────
function speak(text) {
  setStatus('SPEAKING','speaking');
  log('agent', `Agent: "${text}"`);
  showBubble(text);

  window.speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.rate   = 1.0;
  u.pitch  = 1.1;
  u.volume = 1.0;

  const voices = window.speechSynthesis.getVoices();
  const preferred = ['Google US English','Microsoft Zira','Samantha','Karen','Moira','Google UK English Female'];
  let chosen = null;
  for (const name of preferred) {
    chosen = voices.find(v => v.name === name);
    if (chosen) break;
  }
  if (!chosen) chosen = voices.find(v => /en/i.test(v.lang) && /female/i.test(v.name));
  if (!chosen) chosen = voices.find(v => /en/i.test(v.lang));
  if (chosen) u.voice = chosen;

  u.onstart = () => startAnim();
  u.onend   = () => { stopAnim(); setStatus('READY',''); };
  u.onerror = () => { stopAnim(); setStatus('READY',''); };

  window.speechSynthesis.speak(u);
}

// ── ANIMATIONS ───────────────────────────────────
function startAnim() {
  document.getElementById('avatar-svg').classList.add('talking');
  document.getElementById('visualizer').classList.add('on');
  document.getElementById('m-idle').setAttribute('opacity','0');
  document.getElementById('m-talk').setAttribute('opacity','1');
}
function stopAnim() {
  document.getElementById('avatar-svg').classList.remove('talking');
  document.getElementById('visualizer').classList.remove('on');
  document.getElementById('m-idle').setAttribute('opacity','1');
  document.getElementById('m-talk').setAttribute('opacity','0');
}

// ── UI HELPERS ───────────────────────────────────
function setMic(active) {
  const btn  = document.getElementById('btn-listen');
  const icon = document.getElementById('mic-icon');
  const lbl  = document.getElementById('mic-label');
  if (active) {
    btn.classList.add('listening');
    icon.className = 'fa-solid fa-microphone-slash';
    lbl.textContent = 'LISTENING... CLICK TO STOP';
  } else {
    btn.classList.remove('listening');
    icon.className = 'fa-solid fa-microphone';
    lbl.textContent = 'CLICK TO SPEAK';
  }
}

function setStatus(text, cls) {
  document.getElementById('status-txt').textContent = text;
  const d = document.getElementById('status-dot');
  d.className = 'dot' + (cls ? ' '+cls : '');
}

function showBubble(text) {
  const b = document.getElementById('agent-bubble');
  b.textContent = text;
  b.classList.add('visible');
}

// ── CONSOLE ──────────────────────────────────────
function log(type, msg) {
  const el   = document.getElementById('logs');
  const time = new Date().toLocaleTimeString();
  const row  = document.createElement('div');
  row.className = `log ${type}`;
  row.innerHTML = `<span class="ts">[${time}]</span><span class="msg">${esc(msg)}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}
function clearLog() {
  document.getElementById('logs').innerHTML = '';
  log('sys','Console cleared.');
}
function esc(s) {
  return (s||'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]||c));
}

if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = ()=>{};
</script>
